services:
  api:
    build: .
    container_name: kasa-api
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:-Kasa@2026!}
    volumes:
      # Persistance de la base SQLite — accessible directement dans ./data/
      - ./data:/app/data
      # Persistance des fichiers uploadés — accessible directement dans ./public/uploads/
      - ./public/uploads:/app/public/uploads

  nginx:
    image: nginx:alpine
    container_name: kasa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    container_name: kasa-certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Vérifie et renouvelle les certificats toutes les 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-www:
  certbot-certs:
